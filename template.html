<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caravan Wellness — Content Dashboard</title>
<style>
/* ── Reset ── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f0f2f5; color: #1a1a2e; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── Header ── */
header { background: #1a1a2e; color: white; padding: 10px 18px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
header h1 { font-size: 16px; font-weight: 700; white-space: nowrap; letter-spacing: -.3px; }
.ai-search-wrap { flex: 1; display: flex; gap: 7px; max-width: 640px; }
.ai-search-input { flex: 1; padding: 7px 14px; border-radius: 20px; border: none; font-size: 13px; background: rgba(255,255,255,.14); color: white; outline: none; }
.ai-search-input::placeholder { color: rgba(255,255,255,.45); }
.ai-search-input:focus { background: rgba(255,255,255,.22); }
.ai-search-btn { padding: 7px 15px; border-radius: 20px; border: none; background: #e63946; color: white; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap; letter-spacing: .3px; }
.ai-search-btn:hover { background: #c1121f; }
.ai-search-btn:disabled { opacity: .5; cursor: default; }
header .meta { font-size: 11px; color: #888; white-space: nowrap; margin-left: auto; }

/* ── AI Result Bar ── */
.ai-result-bar { background: #2a2a46; color: #ccc; font-size: 12px; padding: 5px 18px; display: none; align-items: center; gap: 10px; flex-shrink: 0; }
.ai-result-bar.show { display: flex; }
.ai-result-bar .explanation { font-style: italic; flex: 1; }
.ai-result-bar .result-count { color: white; font-weight: 600; }
.ai-result-bar .clear-ai { cursor: pointer; color: #e63946; font-weight: 700; padding: 2px 6px; }
.ai-result-bar .clear-ai:hover { text-decoration: underline; }

/* ── Tabs ── */
.tabs { background: white; border-bottom: 2px solid #e8e8e8; display: flex; padding: 0 18px; flex-shrink: 0; }
.tab { padding: 10px 16px; cursor: pointer; font-weight: 500; color: #777; border-bottom: 3px solid transparent; margin-bottom: -2px; font-size: 13px; transition: color .15s; }
.tab.active { color: #1a1a2e; border-bottom-color: #e63946; }
.tab:hover:not(.active) { color: #333; background: #fafafa; }

/* ── Main Layout ── */
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 230px; background: white; border-right: 1px solid #e8e8e8; padding: 13px; overflow-y: auto; flex-shrink: 0; }
.sidebar h3 { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: #aaa; margin-bottom: 5px; font-weight: 700; }
.filter-group { margin-bottom: 13px; }
select, input[type=text] { width: 100%; padding: 6px 9px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; outline: none; background: white; }
select:focus, input[type=text]:focus { border-color: #1a1a2e; }
.sidebar-count { font-size: 12px; color: #999; margin-top: 6px; }
.sidebar-count strong { color: #1a1a2e; }

/* ── Content/Table ── */
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { padding: 9px 13px; background: white; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; gap: 8px; }
.btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 12px; background: white; color: #333; }
.btn:hover { background: #f5f5f5; }
.btn.primary { background: #1a1a2e; color: white; border-color: #1a1a2e; }
.btn.primary:hover { background: #2d2d4e; }
.table-wrap { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; }
th { position: sticky; top: 0; background: #f8f9fa; text-align: left; padding: 9px 11px; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: #777; border-bottom: 2px solid #e8e8e8; z-index: 10; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { background: #eee; }
td { padding: 8px 11px; border-bottom: 1px solid #f2f2f2; vertical-align: middle; }
tr:hover td { filter: brightness(.97); }
tr.selected td { box-shadow: inset 3px 0 0 #1a6eb5; background: #f0f6fc !important; filter: none !important; }
.id-cell { font-family: monospace; font-size: 11px; color: #aaa; white-space: nowrap; }
.title-cell { max-width: 300px; }
.title-text { font-weight: 500; line-height: 1.35; display: flex; align-items: flex-start; gap: 5px; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-High { background: #fde8e8; color: #c0392b; }
.badge-Moderate { background: #fef3e2; color: #d68910; }
.badge-Low { background: #e8f8f0; color: #27ae60; }
.badge-type { background: #e8ecf8; color: #2c3e8c; }
.edited-dot { display: inline-block; width: 6px; height: 6px; background: #e63946; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.empty-state { text-align: center; padding: 60px 20px; color: #ccc; font-size: 15px; }
.sort-asc::after { content: ' ↑'; }
.sort-desc::after { content: ' ↓'; }

/* ── Detail Panel ── */
.detail-panel { width: 410px; background: white; border-left: 1px solid #e8e8e8; display: none; flex-direction: column; flex-shrink: 0; }
.detail-panel.open { display: flex; }
.detail-header { padding: 13px 14px 10px; border-bottom: 1px solid #eee; flex-shrink: 0; position: relative; }
.detail-close { position: absolute; top: 10px; right: 11px; border: none; background: none; font-size: 18px; cursor: pointer; color: #bbb; line-height: 1; }
.detail-close:hover { color: #333; }
.title-box { border-radius: 7px; padding: 10px 12px; margin-bottom: 5px; }
.title-box h2 { font-size: 14px; line-height: 1.45; word-break: break-word; }
.detail-id { font-family: monospace; color: #bbb; font-size: 11px; }
.edited-stamp { color: #e63946; font-style: italic; font-family: sans-serif; }
.detail-body { overflow-y: auto; flex: 1; padding: 11px 14px 20px; }
.detail-section { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: #bbb; font-weight: 700; border-top: 1px solid #eee; padding-top: 10px; margin: 14px 0 9px; }
.detail-section:first-child { border-top: none; margin-top: 0; }
.detail-field { margin-bottom: 10px; }
.detail-field > label { font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: #bbb; display: block; margin-bottom: 4px; font-weight: 700; }
.field-edit { width: 100%; padding: 6px 8px; border: 1px solid #e0e0e0; border-radius: 5px; font-size: 13px; font-family: inherit; outline: none; background: white; color: #1a1a2e; }
.field-edit:focus { border-color: #1a1a2e; }
select.field-edit { height: 30px; }
textarea.field-edit { resize: vertical; }
.link-row { display: flex; gap: 5px; }
.link-row .field-edit { flex: 1; }
.open-btn { padding: 6px 9px; border: 1px solid #e0e0e0; border-radius: 5px; background: #f8f9fa; cursor: pointer; font-size: 12px; color: #1a6eb5; white-space: nowrap; flex-shrink: 0; }
.open-btn:hover { background: #e8f0fb; }

/* Toggle */
.toggle-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.toggle { width: 34px; height: 19px; background: #ddd; border-radius: 10px; cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
.toggle.on { background: #27ae60; }
.toggle::after { content: ''; width: 15px; height: 15px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left .2s; }
.toggle.on::after { left: 17px; }
.toggle-label { font-size: 13px; color: #444; }

/* Color swatches */
.color-pair { display: flex; gap: 10px; }
.color-pair > div { flex: 1; }
.color-pair > div > label { font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: #bbb; display: block; margin-bottom: 5px; font-weight: 700; }
.swatch-row { display: flex; gap: 4px; flex-wrap: wrap; }
.swatch { width: 21px; height: 21px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: transform .12s, border-color .12s; }
.swatch:hover { transform: scale(1.18); }
.swatch.active { border-color: #1a1a2e; }
.swatch-clear { background: white; border: 2px dashed #ccc; font-size: 11px; display: flex; align-items: center; justify-content: center; color: #bbb; }
.swatch-clear:hover { border-color: #888; }

/* Tags */
.tag-wrap { display: flex; flex-wrap: wrap; gap: 5px; border: 1px solid #e0e0e0; border-radius: 5px; padding: 5px; min-height: 34px; cursor: text; }
.tag-wrap:focus-within { border-color: #1a1a2e; }
.tag { background: #1a1a2e; color: white; border-radius: 12px; padding: 2px 9px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
.tag-x { cursor: pointer; opacity: .55; font-size: 13px; line-height: 1; }
.tag-x:hover { opacity: 1; }
.tag-wrap input { border: none; outline: none; font-size: 13px; flex: 1; min-width: 70px; background: transparent; }

/* Change log */
.change-entry { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
.change-date { color: #bbb; white-space: nowrap; flex-shrink: 0; }
.change-desc { flex: 1; color: #444; }
.change-by { color: #aaa; white-space: nowrap; flex-shrink: 0; font-style: italic; }
.log-add-btn { font-size: 12px; color: #1a6eb5; cursor: pointer; border: none; background: none; padding: 5px 0; margin-top: 2px; }
.log-add-btn:hover { text-decoration: underline; }
.log-form { background: #f8f9fa; border-radius: 6px; padding: 9px; margin-top: 7px; }
.log-form input { width: 100%; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 12px; margin-bottom: 5px; outline: none; }
.log-form input:focus { border-color: #1a1a2e; }
.log-form .row2 { display: flex; gap: 5px; }
.log-form .row2 input { margin-bottom: 0; }
.log-form .save-btn { margin-top: 7px; padding: 5px 12px; background: #1a1a2e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }

/* Contributor link */
.contrib-link { color: #1a6eb5; cursor: pointer; font-size: 11px; white-space: nowrap; text-decoration: underline dotted; }
.contrib-link:hover { text-decoration: underline; }

/* ── Contributor Modal ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.38); z-index: 200; display: none; }
.overlay.open { display: block; }
.contrib-panel { position: fixed; top: 0; right: 0; width: 460px; height: 100vh; background: white; box-shadow: -6px 0 24px rgba(0,0,0,.13); display: flex; flex-direction: column; z-index: 201; overflow: hidden; }
.contrib-head { background: #1a1a2e; color: white; padding: 18px 18px 14px; flex-shrink: 0; position: relative; }
.contrib-head h2 { font-size: 18px; font-weight: 600; }
.contrib-head .sub { color: #aaa; font-size: 13px; margin-top: 3px; }
.contrib-head .stats { color: #888; font-size: 12px; margin-top: 8px; }
.contrib-close { position: absolute; top: 13px; right: 13px; border: none; background: rgba(255,255,255,.12); color: white; font-size: 16px; cursor: pointer; width: 28px; height: 28px; border-radius: 50%; }
.contrib-close:hover { background: rgba(255,255,255,.25); }
.contrib-body { flex: 1; overflow-y: auto; padding: 16px; }
.contrib-section { margin-bottom: 18px; }
.contrib-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #bbb; font-weight: 700; margin-bottom: 9px; }
.contrib-item { padding: 8px 10px; border-radius: 6px; background: #f9f9f9; margin-bottom: 5px; cursor: pointer; border: 1px solid transparent; }
.contrib-item:hover { background: #f0f0f0; border-color: #e0e0e0; }
.contrib-item .ci-id { font-family: monospace; font-size: 11px; color: #bbb; }
.contrib-item .ci-title { font-size: 13px; font-weight: 500; margin-top: 2px; line-height: 1.35; }
.contrib-item .ci-tags { margin-top: 5px; display: flex; gap: 4px; }

/* ── Client Licensing Tab ── */
.license-page { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f0f2f5; }
.client-bar { background: white; border-bottom: 1px solid #e8e8e8; padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
.client-bar-label { font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
.bubbles-wrap { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.client-bubble { display: inline-flex; align-items: center; gap: 4px; padding: 5px 11px; border-radius: 16px; background: #e8ecf8; color: #2c3e8c; font-size: 12px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: .15s; user-select: none; }
.client-bubble:hover { background: #d4dcf5; }
.client-bubble.active { border-color: #1a1a2e; background: #1a1a2e; color: white; }
.client-bubble .bx { opacity: .4; font-size: 13px; line-height: 1; margin-left: 2px; }
.client-bubble:hover .bx { opacity: .8; }
.add-client-row { display: flex; gap: 6px; flex-shrink: 0; }
.add-client-input { padding: 5px 11px; border: 1px solid #ddd; border-radius: 16px; font-size: 12px; outline: none; width: 160px; }
.add-client-input:focus { border-color: #1a1a2e; }
.add-client-btn { padding: 5px 12px; border-radius: 16px; border: none; background: #1a1a2e; color: white; cursor: pointer; font-size: 12px; font-weight: 600; }
.add-client-btn:hover { background: #2d2d4e; }
.client-content-area { flex: 1; overflow-y: auto; }
.client-welcome { text-align: center; padding: 70px 20px; color: #ccc; font-size: 15px; }
.client-detail { padding: 18px; }
.client-detail h2 { font-size: 17px; font-weight: 600; margin-bottom: 12px; }
.client-meta { display: flex; gap: 14px; margin-bottom: 18px; }
.client-meta-field { flex: 1; }
.client-meta-field label { font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: #bbb; display: block; margin-bottom: 4px; font-weight: 700; }
.client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 9px; }
.client-card { background: white; border-radius: 7px; border: 1px solid #e8e8e8; padding: 11px; cursor: pointer; transition: .15s; }
.client-card:hover { border-color: #aaa; box-shadow: 0 1px 5px rgba(0,0,0,.07); }
.client-card .cc-id { font-family: monospace; font-size: 11px; color: #bbb; }
.client-card .cc-title { font-size: 13px; font-weight: 500; margin-top: 3px; line-height: 1.35; }
.client-card .cc-badge { margin-top: 6px; }
.no-content { color: #bbb; font-size: 13px; padding: 20px 0; }
.client-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #bbb; font-weight: 700; margin-bottom: 10px; }

/* Loading spinner */
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>Caravan Wellness</h1>
  <div class="ai-search-wrap">
    <input class="ai-search-input" id="aiInput" type="text"
      placeholder="🔍  AI search — try 'videos about stress' or 'articles by Diane'…">
    <button class="ai-search-btn" id="aiBtn" onclick="doAiSearch()">Search</button>
  </div>
  <div class="meta" id="headerMeta">Extracted __EXTRACTED__ &nbsp;·&nbsp; <span id="totalCount"></span> items</div>
</header>

<div class="ai-result-bar" id="aiBar">
  <span class="explanation" id="aiExpl"></span>
  <span class="result-count" id="aiCount"></span>
  <span class="clear-ai" onclick="clearAi()">✕ Clear</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="review">Review Tracker</div>
  <div class="tab" data-tab="library">Content Library</div>
  <div class="tab" data-tab="licensing">Client Licensing</div>
</div>

<!-- Review / Library view -->
<div class="main" id="mainView">
  <div class="sidebar">
    <div class="filter-group">
      <h3>Filter by title</h3>
      <input type="text" id="titleFilter" placeholder="Type to filter…">
    </div>
    <div class="filter-group">
      <h3>Type</h3>
      <select id="typeFilter"><option value="">All Types</option></select>
    </div>
    <div class="filter-group">
      <h3>Category</h3>
      <select id="catFilter"><option value="">All Categories</option></select>
    </div>
    <div class="filter-group" id="prioGroup">
      <h3>Priority</h3>
      <select id="prioFilter">
        <option value="">All</option>
        <option>High</option><option>Moderate</option><option>Low</option>
      </select>
    </div>
    <div class="filter-group" id="authorGroup">
      <h3>Author</h3>
      <select id="authorFilter"><option value="">All</option></select>
    </div>
    <div class="filter-group" id="langGroup" style="display:none">
      <h3>Language</h3>
      <select id="langFilter"><option value="">All</option></select>
    </div>
    <div class="sidebar-count">Showing <strong id="shownCount">0</strong> items</div>
  </div>

  <div class="content">
    <div class="toolbar">
      <button class="btn primary" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div class="table-wrap">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
      <div class="empty-state" id="emptyState" style="display:none">No items match.</div>
    </div>
  </div>

  <div class="detail-panel" id="detailPanel"></div>
</div>

<!-- Licensing view -->
<div id="licenseView" style="display:none; flex:1; overflow:hidden; flex-direction:column;">
  <div class="license-page">
    <div class="client-bar">
      <span class="client-bar-label">Clients</span>
      <div class="bubbles-wrap" id="bubblesWrap"></div>
      <div class="add-client-row">
        <input class="add-client-input" id="newClientInput" type="text" placeholder="New client name…">
        <button class="add-client-btn" onclick="addClient()">+ Add</button>
      </div>
    </div>
    <div class="client-content-area" id="clientArea">
      <div class="client-welcome">Select a client to view their licensed content, or add a new one above.</div>
    </div>
  </div>
</div>

<!-- Contributor overlay -->
<div class="overlay" id="contribOverlay" onclick="maybeCloseContrib(event)"></div>
<div class="contrib-panel" id="contribPanel" style="display:none">
  <div class="contrib-head" id="contribHead"></div>
  <div class="contrib-body" id="contribBody"></div>
</div>

<script>
const DATA       = __DATA_PLACEHOLDER__;
const CHANGE_LOG = __CHANGELOG_PLACEHOLDER__;

// ── localStorage ──────────────────────────────────────────────────────────────
const EDITS_KEY   = 'cw_edits_v3';
const CLIENTS_KEY = 'cw_clients_v2';
const CMETA_KEY   = 'cw_cmeta_v2';

let edits     = {};
let clients   = [];
let clientMeta= {};

try { edits      = JSON.parse(localStorage.getItem(EDITS_KEY)   || '{}'); } catch(e){}
try { clients    = JSON.parse(localStorage.getItem(CLIENTS_KEY) || '[]'); } catch(e){}
try { clientMeta = JSON.parse(localStorage.getItem(CMETA_KEY)   || '{}'); } catch(e){}

const save = () => localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
const saveC = () => localStorage.setItem(CLIENTS_KEY, JSON.stringify(clients));
const saveCM= () => localStorage.setItem(CMETA_KEY, JSON.stringify(clientMeta));

function gE(id, f, def) { return (edits[id]&&edits[id][f]!==undefined) ? edits[id][f] : def; }
function sE(id, f, v)   {
  if (!edits[id]) edits[id]={};
  edits[id][f] = v;
  edits[id]._at = new Date().toISOString();
  save();
}
function lv(item, f) {
  const v = gE(item.id, f, undefined);
  return v !== undefined ? v : (item[f] !== undefined ? item[f] : '');
}

// ── Data ──────────────────────────────────────────────────────────────────────
const ALL = [
  ...DATA.articles, ...DATA.infographics, ...DATA.videos,
  ...DATA.video_library, ...DATA.infographic_library, ...DATA.article_library,
];
const BY_ID = {};
ALL.forEach(i => BY_ID[i.id] = i);

document.getElementById('totalCount').textContent = ALL.length.toLocaleString();

const REVIEW_SET  = new Set(['Article','Infographic','Video']);
const LIBRARY_SET = new Set(['Video Library','Infographic Library','Article Library']);
const ALL_TYPES   = ['Article','Infographic','Video','Video Library','Infographic Library','Article Library'];
const ALL_CATS    = [...new Set(ALL.map(i=>i.category))].sort();

// ── Colors ────────────────────────────────────────────────────────────────────
const BG_COLORS = [
  {hex:'#fde8e8',lbl:'Red'},{hex:'#fef3e2',lbl:'Orange'},{hex:'#fffde7',lbl:'Yellow'},
  {hex:'#e8f8f0',lbl:'Green'},{hex:'#e8f4f8',lbl:'Blue'},{hex:'#f0e8f8',lbl:'Purple'},
  {hex:'#f5f5f5',lbl:'Grey'},{hex:'#1a1a2e',lbl:'Dark'},
];
const FG_COLORS = [
  {hex:'#1a1a2e',lbl:'Dark'},{hex:'#c0392b',lbl:'Red'},{hex:'#d68910',lbl:'Orange'},
  {hex:'#27ae60',lbl:'Green'},{hex:'#1a6eb5',lbl:'Blue'},{hex:'#7d3c98',lbl:'Purple'},
  {hex:'#888888',lbl:'Grey'},{hex:'#ffffff',lbl:'White'},
];

function swatchHtml(colors, key, cur) {
  const cl = `<div class="swatch swatch-clear${!cur?' active':''}" data-k="${key}" data-c="" title="Clear">✕</div>`;
  return '<div class="swatch-row">'+cl+colors.map(c=>
    `<div class="swatch${cur===c.hex?' active':''}" data-k="${key}" data-c="${c.hex}" style="background:${c.hex}" title="${c.lbl}"></div>`
  ).join('')+'</div>';
}

// ── State ─────────────────────────────────────────────────────────────────────
let activeTab  = 'review';
let visibleItems = [];
let sortKey    = null;
let sortDir    = 1;
let selectedId = null;
let aiIds      = null;
let activeClient = null;

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {

}));

// ── AI Search ─────────────────────────────────────────────────────────────────
document.getElementById('aiInput').addEventListener('keydown', e => { if(e.key==='Enter') doAiSearch(); });

async function doAiSearch() {
  const query = document.getElementById('aiInput').value.trim();
  if (!query) return;
  const btn = document.getElementById('aiBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Searching…';

  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({query})
    });
    if (!res.ok) throw new Error('API error');
    const d = await res.json();

    const kws  = (d.keywords  || []).map(k => k.toLowerCase());
    const cats = new Set(d.categories || []);
    const types= new Set(d.types || []);

    const matched = ALL.filter(item => {
      const title = lv(item,'title').toLowerCase();
      if (types.size && types.has(lv(item,'type'))) return true;
      if (cats.size  && cats.has(lv(item,'category'))) return true;
      if (kws.length && kws.some(k => title.includes(k))) return true;
      return false;
    });

    aiIds = new Set(matched.map(i=>i.id));
    const bar = document.getElementById('aiBar');
    bar.classList.add('show');
    document.getElementById('aiExpl').textContent  = d.explanation || '';
    document.getElementById('aiCount').textContent = matched.length + ' results';
    applyFilters();
  } catch(e) {
    // Fallback: keyword search
    const q = query.toLowerCase();
    const matched = ALL.filter(i => lv(i,'title').toLowerCase().includes(q));
    aiIds = new Set(matched.map(i=>i.id));
    document.getElementById('aiBar').classList.add('show');
    document.getElementById('aiExpl').textContent  = `Keyword match for "${query}"`;
    document.getElementById('aiCount').textContent = matched.length + ' results';
    applyFilters();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

function clearAi() {
  aiIds = null;
  document.getElementById('aiInput').value = '';
  document.getElementById('aiBar').classList.remove('show');
  applyFilters();
}

// ── Filters ───────────────────────────────────────────────────────────────────
function baseItems() {
  if (activeTab==='review')  return ALL.filter(i=>REVIEW_SET.has(i.type));
  if (activeTab==='library') return ALL.filter(i=>LIBRARY_SET.has(i.type));
  return ALL;
}

function seedFilters() {
  const base = baseItems();
  const mk = (arr, sel='') => '<option value="">All</option>'+arr.map(v=>`<option${v===sel?' selected':''}>${v}</option>`).join('');
  document.getElementById('typeFilter').innerHTML   = mk([...new Set(base.map(i=>lv(i,'type')))].sort());
  document.getElementById('catFilter').innerHTML    = mk([...new Set(base.map(i=>lv(i,'category')))].sort());
  document.getElementById('authorFilter').innerHTML = mk([...new Set(base.map(i=>lv(i,'author')).filter(Boolean))].sort());
  document.getElementById('langFilter').innerHTML   = mk([...new Set(base.map(i=>lv(i,'language')).filter(Boolean))].sort());
  const rv = activeTab==='review';
  document.getElementById('prioGroup').style.display   = rv ? '' : 'none';
  document.getElementById('authorGroup').style.display  = rv ? '' : 'none';
  document.getElementById('langGroup').style.display    = activeTab==='library' ? '' : 'none';
}

['titleFilter','typeFilter','catFilter','prioFilter','authorFilter','langFilter'].forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener('input',  applyFilters);
  el.addEventListener('change', applyFilters);
});

function applyFilters() {
  const title  = document.getElementById('titleFilter').value.toLowerCase();
  const type   = document.getElementById('typeFilter').value;
  const cat    = document.getElementById('catFilter').value;
  const prio   = document.getElementById('prioFilter').value;
  const author = document.getElementById('authorFilter').value;
  const lang   = document.getElementById('langFilter').value;

  visibleItems = baseItems().filter(item => {
    if (aiIds && !aiIds.has(item.id)) return false;
    if (title  && !lv(item,'title').toLowerCase().includes(title)) return false;
    if (type   && lv(item,'type')   !== type)   return false;
    if (cat    && lv(item,'category') !== cat)  return false;
    if (prio   && lv(item,'review_priority') !== prio) return false;
    if (author && lv(item,'author') !== author) return false;
    if (lang   && lv(item,'language') !== lang) return false;
    return true;
  });

  if (sortKey) visibleItems.sort((a,b)=>lv(a,sortKey).localeCompare(lv(b,sortKey))*sortDir);
  renderTable();
  document.getElementById('shownCount').textContent = visibleItems.length.toLocaleString();
}

// ── Table ─────────────────────────────────────────────────────────────────────
function getCols() {
  if (activeTab==='review') return [
    {k:'id',l:'ID'},{k:'type',l:'Type'},{k:'title',l:'Title'},{k:'category',l:'Category'},
    {k:'review_priority',l:'Priority'},{k:'author',l:'Author'},
    {k:'version',l:'Ver.'},{k:'date_created',l:'Created'},{k:'date_revised',l:'Revised'},
  ];
  return [
    {k:'id',l:'ID'},{k:'type',l:'Type'},{k:'title',l:'Title'},{k:'category',l:'Category'},
    {k:'language',l:'Language'},{k:'teacher',l:'Teacher/Reviewer'},
  ];
}

function renderTable() {
  const cols = getCols();
  document.getElementById('thead').innerHTML = '<tr>'+cols.map(c=>{
    const cls = sortKey===c.k ? (sortDir===1?'sort-asc':'sort-desc') : '';
    return `<th class="${cls}" data-k="${c.k}">${c.l}</th>`;
  }).join('')+'</tr>';
  document.querySelectorAll('#thead th').forEach(th=>th.addEventListener('click',()=>{
    if(sortKey===th.dataset.k) sortDir*=-1; else{sortKey=th.dataset.k;sortDir=1;}
    visibleItems.sort((a,b)=>lv(a,sortKey).localeCompare(lv(b,sortKey))*sortDir);
    renderTable();
  }));

  const body  = document.getElementById('tbody');
  const empty = document.getElementById('emptyState');
  if (!visibleItems.length) { body.innerHTML=''; empty.style.display=''; return; }
  empty.style.display = 'none';

  body.innerHTML = visibleItems.map(item => {
    const bg  = gE(item.id,'row_bg','');
    const fg  = gE(item.id,'row_text','');
    const lic = gE(item.id,'licenses',item.client_licenses||[]);
    const mod = !!(edits[item.id]&&edits[item.id]._at);
    const sel = item.id===selectedId;
    const tdS = bg||fg ? `style="${bg?'background:'+bg+';':''}${fg?'color:'+fg:''}"` : '';

    return '<tr'+(sel?' class="selected"':'')+` data-id="${item.id}">`+cols.map(c=>{
      const s = c.k==='id' ? '' : tdS;
      if (c.k==='id')   return `<td class="id-cell">${item.id}</td>`;
      if (c.k==='title') {
        const licTxt = lic.length ? `<span style="font-size:10px;opacity:.5;margin-left:3px">[${lic.join(', ')}]</span>` : '';
        const dot    = mod ? '<span class="edited-dot" title="Edited"></span>' : '';
        return `<td class="title-cell" ${s}><div class="title-text">${esc(lv(item,'title'))}${licTxt}${dot}</div></td>`;
      }
      if (c.k==='type') return `<td ${s}><span class="badge badge-type">${esc(lv(item,'type'))}</span></td>`;
      if (c.k==='review_priority') {
        const p=lv(item,'review_priority');
        return `<td ${s}>${p?`<span class="badge badge-${p}">${p}</span>`:''}</td>`;
      }
      const v = c.k==='teacher' ? (lv(item,'teacher')||lv(item,'peer_reviewer')||'') : lv(item,c.k);
      return `<td ${s}>${esc(v)}</td>`;
    }).join('')+'</tr>';
  }).join('');

  document.querySelectorAll('#tbody tr').forEach(row=>
    row.addEventListener('click', ()=>{ const i=BY_ID[row.dataset.id]; if(i) showDetail(i); })
  );
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        reRow(item.id);
        if (el.dataset.f==='title') { const h=document.getElementById('titleBoxH2'); if(h) h.textContent=el.value; }

  });

function toggleF(id, field) {
  const cur = gE(id, field, '');
  sE(id, field, cur==='yes' ? '' : 'yes');
  const item = BY_ID[id];
  if (item) showDetail(item);
}

function saveLog(id) {
  const desc = document.getElementById('logDesc').value.trim();
  const by   = document.getElementById('logBy').value.trim();
  const date = document.getElementById('logDate').value.trim() ||
    new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
  if (!desc) return;
  const list = gE(id,'local_changes',[]);
  list.unshift({date, description:desc, changed_by:by});
  sE(id,'local_changes',list);
  const item = BY_ID[id];
  if (item) showDetail(item);
}

function reRow(id) {
  const row = document.querySelector(`#tbody tr[data-id="${id}"]`);
  if (!row) return;
  const item = BY_ID[id];
  if (!item) return;
  const cols = getCols();
  const bg  = gE(id,'row_bg','');
  const fg  = gE(id,'row_text','');
  const lic = gE(id,'licenses',item.client_licenses||[]);
  const mod = !!(edits[id]&&edits[id]._at);
  const tdS = bg||fg ? `style="${bg?'background:'+bg+';':''}${fg?'color:'+fg:''}"` : '';

  row.innerHTML = cols.map(c=>{
    const s = c.k==='id' ? '' : tdS;
    if (c.k==='id') return `<td class="id-cell">${id}</td>`;
    if (c.k==='title') {
      const licT = lic.length?`<span style="font-size:10px;opacity:.5;margin-left:3px">[${lic.join(', ')}]</span>`:'';
      return `<td class="title-cell" ${s}><div class="title-text">${esc(lv(item,'title'))}${licT}${mod?'<span class="edited-dot"></span>':''}</div></td>`;
    }
    if (c.k==='type') return `<td ${s}><span class="badge badge-type">${esc(lv(item,'type'))}</span></td>`;
    if (c.k==='review_priority'){const p=lv(item,'review_priority');return `<td ${s}>${p?`<span class="badge badge-${p}">${p}</span>`:''}</td>`;}
    const v = c.k==='teacher'?(lv(item,'teacher')||lv(item,'peer_reviewer')||''):lv(item,c.k);
    return `<td ${s}>${esc(v)}</td>`;
  }).join('');

  row.addEventListener('click',()=>{ const i=BY_ID[id]; if(i) showDetail(i); });
  if (id===selectedId) row.classList.add('selected');
}

function closeDetail() {
  selectedId = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('selected'));
}

// ── Contributor Profile ────────────────────────────────────────────────────────
function showContrib(name) {
  if (!name) return;
  const authored = ALL.filter(i=>(lv(i,'author')||lv(i,'teacher'))===name);
  const reviewed = ALL.filter(i=>lv(i,'peer_reviewer')===name);
  const creds    = authored.length ? lv(authored[0],'author_creds') : '';

  document.getElementById('contribHead').innerHTML = `
    <button class="contrib-close" onclick="closeContrib()">×</button>
    <h2>${esc(name)}</h2>
    ${creds?`<div class="sub">${esc(creds)}</div>`:''}
    <div class="stats">${authored.length} authored &nbsp;·&nbsp; ${reviewed.length} reviewed</div>
  `;

  function cards(items) {
    if (!items.length) return '<div style="color:#bbb;font-size:13px">None found.</div>';
    return items.map(i=>{
      const p=lv(i,'review_priority');
      return `<div class="contrib-item" onclick="closeContrib();showDetail(BY_ID['${i.id}'])">
        <div class="ci-id">${i.id}</div>
        <div class="ci-title">${esc(lv(i,'title'))}</div>
        <div class="ci-tags">${p?`<span class="badge badge-${p}">${p}</span> `:''}
          <span class="badge badge-type">${esc(lv(i,'type'))}</span>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('contribBody').innerHTML = `
    <div class="contrib-section"><h3>Authored / Created (${authored.length})</h3>${cards(authored)}</div>
    ${reviewed.length?`<div class="contrib-section"><h3>Peer Reviewed (${reviewed.length})</h3>${cards(reviewed)}</div>`:''}
  `;

  document.getElementById('contribOverlay').classList.add('open');
  document.getElementById('contribPanel').style.display = 'flex';
}

function closeContrib() {
  document.getElementById('contribOverlay').classList.remove('open');
  document.getElementById('contribPanel').style.display = 'none';
}
function maybeCloseContrib(e) { if(e.target===document.getElementById('contribOverlay')) closeContrib(); }

// ── Client Licensing ──────────────────────────────────────────────────────────
function renderClientBubbles() {
  document.getElementById('bubblesWrap').innerHTML = clients.map(c=>`
    <div class="client-bubble${activeClient===c?' active':''}" data-c="${esc(c)}">
      <span onclick="selectClient('${esc(c)}')">${esc(c)}</span>
      <span class="bx" onclick="removeClient('${esc(c)}')">×</span>
    </div>`).join('');
  if (activeClient) renderClientDetail(activeClient);
}

function addClient() {
  const input = document.getElementById('newClientInput');
  const name  = input.value.trim();
  if (!name || clients.includes(name)) return;
  clients.push(name);
  saveC();
  input.value = '';
  activeClient = name;
  renderClientBubbles();
}
document.getElementById('newClientInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addClient(); });

function removeClient(name) {
  clients = clients.filter(c=>c!==name);
  saveC();
  if (activeClient===name) {
    activeClient = null;
    document.getElementById('clientArea').innerHTML = '<div class="client-welcome">Select a client above to view their licensed content.</div>';
  }
  renderClientBubbles();
}

function selectClient(name) {
  activeClient = name;
  renderClientBubbles();
}

function renderClientDetail(name) {
  if (!clientMeta[name]) clientMeta[name] = {delivery:'',notes:''};
  const meta  = clientMeta[name];
  const items = ALL.filter(i => gE(i.id,'licenses',i.client_licenses||[]).includes(name));

  document.getElementById('clientArea').innerHTML = `
    <div class="client-detail">
      <h2>${esc(name)} <span style="font-size:14px;font-weight:400;color:#999">${items.length} licensed items</span></h2>
      <div class="client-meta">
        <div class="client-meta-field">
          <label>Delivery Method</label>
          <input class="field-edit" id="cDelivery" value="${esc(meta.delivery)}" placeholder="e.g. API, Portal, Direct">
        </div>
        <div class="client-meta-field">
          <label>Notes</label>
          <input class="field-edit" id="cNotes" value="${esc(meta.notes)}" placeholder="Any notes…">
        </div>
      </div>
      <div class="client-section-label">Licensed Content</div>
      ${items.length
        ? `<div class="client-grid">${items.map(i=>`
            <div class="client-card" onclick="jumpToItem('${i.id}')">
              <div class="cc-id">${i.id}</div>
              <div class="cc-title">${esc(lv(i,'title'))}</div>
              <div class="cc-badge"><span class="badge badge-type">${esc(lv(i,'type'))}</span></div>
            </div>`).join('')}</div>`
        : `<div class="no-content">No content licensed to ${esc(name)} yet.<br>Open any content item and add "${esc(name)}" to its Client Licenses.</div>`
      }
    </div>
  `;

  document.getElementById('cDelivery').addEventListener('change', e=>{ clientMeta[name].delivery=e.target.value; saveCM(); });
  document.getElementById('cNotes').addEventListener('change',    e=>{ clientMeta[name].notes=e.target.value;    saveCM(); });
}

function jumpToItem(id) {
  document.querySelector('.tab[data-tab="review"]').click();
  setTimeout(()=>{
    const item = BY_ID[id];
    if (!item) return;
    showDetail(item);
    const row = document.querySelector(`#tbody tr[data-id="${id}"]`);
    if (row) row.scrollIntoView({block:'center'});
  }, 120);
}

// ── CSV Export ────────────────────────────────────────────────────────────────
function exportCSV() {
  const cols = getCols();
  const hdrs = [...cols.map(c=>c.l),'Client Licenses','Notes'];
  const rows = [hdrs.join(',')];
  visibleItems.forEach(item=>{
    const lic   = gE(item.id,'licenses',item.client_licenses||[]);
    const notes = gE(item.id,'notes',item.notes||'');
    const vals  = [
      ...cols.map(c=>{
        const v = c.k==='teacher'?(lv(item,'teacher')||lv(item,'peer_reviewer')||''):lv(item,c.k);
        return '"'+String(v||'').replace(/"/g,'""')+'"';
      }),
      '"'+lic.join('; ')+'"',
      '"'+notes.replace(/"/g,'""')+'"',
    ];
    rows.push(vals.join(','));
  });
  const blob = new Blob([rows.join('\n')],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'caravan-export.csv';
  a.click();
}

// ── Init ──────────────────────────────────────────────────────────────────────
seedFilters();
applyFilters();
</script>
